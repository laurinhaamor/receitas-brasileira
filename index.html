<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabores do Brasil</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fff7ed;
  --card:#ffffff;
  --text:#222;
  --primary:#2e7d32;
  --accent:#ff6f00;
}

body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#1b5e20,#43a047);
  color:white;
  padding:40px;
  text-align:center;
}

header h1{font-size:40px}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  padding:20px;
}

input,select,button{
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  cursor:pointer;
  background:var(--primary);
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.info{
  padding:15px;
}

.info h3{
  color:var(--primary);
}

.small{
  font-size:13px;
  opacity:0.8;
  margin:5px 0;
}

.btns{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.btns button{
  flex:1;
  margin:2px;
  font-size:12px;
}

.fav{
  background:#e91e63;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:var(--card);
  padding:20px;
  width:90%;
  max-width:600px;
  border-radius:15px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:22px;
}
</style>
</head>

<body>

<header>
<h1>🍴 Sabores do Brasil</h1>
<p>Receitas tradicionais e deliciosas</p>
</header>

<div class="controls">

<input id="search" placeholder="Buscar receita...">

<select id="filter">
<option value="all">Todas categorias</option>
<option value="salgado">Salgados</option>
<option value="doce">Doces</option>
<option value="regional">Regionais</option>
</select>

<button onclick="toggleTheme()">🌙 Modo</button>

</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="modalBody"></div>
</div>
</div>

<script>

// 🍽️ MAIS RECEITAS
const receitas = [
{
nome:"Feijoada",
cat:"salgado",
img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d",
desc:"Clássico brasileiro completo",
ingredientes:["Feijão preto","Carne seca","Linguiça","Alho","Cebola"],
modo:"Cozinhe tudo lentamente por 2 horas."
},

{
nome:"Pão de Queijo",
cat:"salgado",
img:"https://images.unsplash.com/photo-1606787366850-de6330128bfc",
desc:"Mineirinho perfeito",
ingredientes:["Polvilho","Queijo","Leite","Ovos"],
modo:"Misture e asse até dourar."
},

{
nome:"Brigadeiro",
cat:"doce",
img:"https://images.unsplash.com/photo-1547592180-85f173990554",
desc:"Doce mais amado do Brasil",
ingredientes:["Leite condensado","Chocolate","Manteiga"],
modo:"Mexa até desgrudar da panela."
},

{
nome:"Moqueca Baiana",
cat:"regional",
img:"https://images.unsplash.com/photo-1625944525533-473f7b7c8a12",
desc:"Peixe com dendê",
ingredientes:["Peixe","Leite de coco","Dendê","Pimentão"],
modo:"Cozinhe tudo em panela de barro."
},

{
nome:"Acarajé",
cat:"regional",
img:"https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56",
desc:"Bahia raiz",
ingredientes:["Feijão fradinho","Cebola","Dendê","Vatapá"],
modo:"Frite no azeite de dendê."
},

{
nome:"Baião de Dois",
cat:"regional",
img:"https://images.unsplash.com/photo-1601050690597-df0568f70950",
desc:"Nordeste puro",
ingredientes:["Arroz","Feijão verde","Queijo coalho"],
modo:"Misture tudo e cozinhe junto."
},

{
nome:"Cuscuz",
cat:"regional",
img:"https://images.unsplash.com/photo-1627308595229-7830a5c91f9f",
desc:"Simples e delicioso",
ingredientes:["Flocão de milho","Sal","Água"],
modo:"Cozinhe no vapor."
},

{
nome:"Quindim",
cat:"doce",
img:"https://images.unsplash.com/photo-1605478371310-4d0c2a0b8a10",
desc:"Doce brilhante",
ingredientes:["Coco","Ovos","Açúcar"],
modo:"Asse em banho-maria."
}
];

function render(list){
const grid = document.getElementById("grid");
grid.innerHTML="";

list.forEach((r,i)=>{
grid.innerHTML += `
<div class="card">
<img src="${r.img}">
<div class="info">
<h3>${r.nome}</h3>
<p class="small">${r.desc}</p>

<div class="btns">
<button onclick="openModal(${i})">Ver</button>
<button class="fav" onclick="fav('${r.nome}')">❤</button>
</div>

</div>
</div>
`;
});
}

function openModal(i){
const r = receitas[i];

document.getElementById("modalBody").innerHTML = `
<h2>${r.nome}</h2>
<p>${r.desc}</p>

<h3>Ingredientes</h3>
<ul>
${r.ingredientes.map(x=>`<li>${x}</li>`).join("")}
</ul>

<h3>Modo de preparo</h3>
<p>${r.modo}</p>
`;

document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function fav(name){
let favs = JSON.parse(localStorage.getItem("fav")||"[]");
if(favs.includes(name)){
favs = favs.filter(f=>f!==name);
}else{
favs.push(name);
}
localStorage.setItem("fav",JSON.stringify(favs));
alert("Favoritos atualizados ❤️");
}

document.getElementById("search").addEventListener("input",e=>{
const v = e.target.value.toLowerCase();
render(receitas.filter(r=>r.nome.toLowerCase().includes(v)));
});

document.getElementById("filter").addEventListener("change",e=>{
const v = e.target.value;
if(v==="all") return render(receitas);
render(receitas.filter(r=>r.cat===v));
});

function toggleTheme(){
document.body.classList.toggle("dark");
}

render(receitas);

</script>

</body>
</html>
